<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.game-wrapper {
  background: #16213e;
  padding: clamp(16px, 4vw, 30px);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  text-align: center;
  max-width: 95vw;
}
h1 {
  color: #e94560;
  font-size: clamp(20px, 4vw, 28px);
  margin-bottom: 12px;
  letter-spacing: 4px;
  user-select: none;
}
.canvas-container {
  position: relative;
  display: inline-block;
  max-width: 100%;
}
canvas {
  background: #0f3460;
  border-radius: 8px;
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1/1;
  max-width: 400px;
  touch-action: none;
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.68);
  border-radius: 8px;
  color: #fff;
  gap: 10px;
  padding: 20px;
}
.overlay.hidden { display: none; }
.overlay h2 { font-size: clamp(24px, 5vw, 32px); }
.overlay p { font-size: 14px; opacity: 0.75; }
.overlay .btn {
  padding: 10px 36px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #e94560;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.overlay .btn:hover { background: #c73650; }
.overlay .btn:active { transform: scale(0.96); }

/* Speed selector */
.speed-group { margin: 4px 0 6px; }
.speed-group label {
  display: inline-block;
  margin: 4px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  transition: all 0.2s;
  user-select: none;
}
.speed-group input { display: none; }
.speed-group input:checked + label {
  background: #e94560;
  color: #fff;
  font-weight: 600;
}

/* Pause badge */
.pause-badge {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.7);
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 6px;
  pointer-events: none;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.pause-badge.hidden { display: none; }

.score-bar {
  display: flex;
  justify-content: space-between;
  color: #fff;
  font-size: 15px;
  margin-top: 10px;
  gap: 8px;
  flex-wrap: wrap;
}
.score-bar div { white-space: nowrap; }
.score-bar .num { color: #e94560; font-weight: bold; }

/* D-pad buttons */
.dpad {
  display: grid;
  grid-template-columns: 64px 64px 64px;
  grid-template-rows: 64px 64px 64px;
  gap: 4px;
  justify-content: center;
  margin-top: 12px;
  user-select: none;
  -webkit-user-select: none;
}
.dpad button {
  width: 64px;
  height: 64px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  font-size: 24px;
  cursor: pointer;
  transition: background 0.1s, transform 0.05s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dpad button:active {
  background: #e94560;
  transform: scale(0.9);
  color: #fff;
}
.dpad .empty { visibility: hidden; }
.dpad .btn-up    { grid-column: 2; grid-row: 1; }
.dpad .btn-left  { grid-column: 1; grid-row: 2; }
.dpad .btn-down  { grid-column: 2; grid-row: 3; }
.dpad .btn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>

<div class="game-wrapper">
  <h1>🐍 贪吃蛇</h1>
  <div class="canvas-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
      <h2>贪吃蛇</h2>
      <p>方向键 / WASD 移动 · 空格暂停</p>
      <div class="speed-group" id="speedGroup">
        <input type="radio" name="speed" id="spSlow" value="250">
        <label for="spSlow">🐢 慢速</label>
        <input type="radio" name="speed" id="spMedium" value="180" checked>
        <label for="spMedium">🐇 中速</label>
        <input type="radio" name="speed" id="spFast" value="120">
        <label for="spFast">🚀 快速</label>
        <input type="radio" name="speed" id="spInsane" value="80">
        <label for="spInsane">💀 极限</label>
      </div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
      <h2>游戏结束</h2>
      <p>得分: <span id="finalScore">0</span></p>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <!-- Pause badge -->
    <div class="pause-badge hidden" id="pauseBadge">已暂停</div>
  </div>

  <div class="score-bar">
    <div>得分: <span class="num" id="score">0</span></div>
    <div>速度: <span class="num" id="speedLabel">中速</span></div>
    <div>最高: <span class="num" id="highScore">0</span></div>
  </div>

  <!-- D-pad for mobile -->
  <div class="dpad" id="dpad">
    <button class="btn-up" data-dir="up">▲</button>
    <button class="btn-left" data-dir="left">◀</button>
    <button class="btn-down" data-dir="down">▼</button>
    <button class="btn-right" data-dir="right">▶</button>
  </div>
</div>

<script>
// ====== Web Audio ======
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type, vol) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch {}
}

// Key press: short tick
function playKeySound() {
  playTone(800, 0.05, 'square', 0.04);
}

// Eat food: cheerful ascending two-tone
function playEatSound() {
  playTone(587, 0.1, 'sine', 0.1);
  setTimeout(() => playTone(784, 0.12, 'sine', 0.1), 80);
}

// Game over: descending
function playGameOverSound() {
  playTone(400, 0.15, 'sawtooth', 0.07);
  setTimeout(() => playTone(250, 0.25, 'sawtooth', 0.07), 120);
}

// ====== DOM refs ======
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const speedLabelEl = document.getElementById('speedLabel');
const highScoreEl = document.getElementById('highScore');
const finalScoreEl = document.getElementById('finalScore');
const startOverlay = document.getElementById('startOverlay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const pauseBadge = document.getElementById('pauseBadge');
const speedRadios = document.querySelectorAll('input[name="speed"]');

const GRID = 20;
const SIZE = 400;
const TILE = SIZE / GRID;

let snake, direction, nextDirection, food, score, highScore, speed;
let gameLoop, gameRunning, gamePaused;

const speedNames = { 250: '慢速', 180: '中速', 120: '快速', 80: '极限' };

// Particles for eat effect
let particles = [];

function init() {
  const mid = Math.floor(GRID / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gamePaused = false;
  particles = [];
  scoreEl.textContent = '0';
  pauseBadge.classList.add('hidden');
  spawnFood();
  draw();
}

function spawnFood() {
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!snake.some(s => s.x === x && s.y === y))
        free.push({ x, y });
  if (free.length === 0) return;
  food = free[Math.floor(Math.random() * free.length)];
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed2 = 1 + Math.random() * 3;
    particles.push({
      x: x * TILE + TILE / 2,
      y: y * TILE + TILE / 2,
      vx: Math.cos(angle) * speed2,
      vy: Math.sin(angle) * speed2,
      life: 1,
      size: 2 + Math.random() * 3,
      color: `hsl(${120 + Math.random() * 40}, 80%, ${55 + Math.random() * 30}%)`,
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * TILE, 0); ctx.lineTo(i * TILE, SIZE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * TILE); ctx.lineTo(SIZE, i * TILE); ctx.stroke();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Food — glowing pulse
  const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 200);
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(food.x * TILE + TILE / 2, food.y * TILE + TILE / 2, (TILE / 2 - 2) * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake — gradient from head to tail
  const len = snake.length;
  snake.forEach((seg, i) => {
    const t = i / Math.max(len - 1, 1);
    const r = Math.round(60 + t * 30);
    const g = Math.round(200 - t * 60);
    const b = Math.round(80 - t * 40);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    if (i === 0) {
      ctx.shadowColor = '#53d769';
      ctx.shadowBlur = 8;
    }
    ctx.beginPath();
    ctx.roundRect(seg.x * TILE + 1, seg.y * TILE + 1, TILE - 2, TILE - 2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Score popup
  if (scorePopup) {
    ctx.globalAlpha = scorePopup.life;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('+1', scorePopup.x, scorePopup.y);
    ctx.globalAlpha = 1;
  }
}

let scorePopup = null;

function update() {
  if (gamePaused) return;

  direction = { ...nextDirection };
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    playGameOverSound();
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    playGameOverSound();
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    playEatSound();
    spawnParticles(food.x, food.y);
    scorePopup = { x: food.x * TILE + TILE / 2, y: food.y * TILE, life: 1 };
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  stopLoop();
  gameRunning = false;
  finalScoreEl.textContent = score;
  if (score > highScore) {
    highScore = score;
    highScoreEl.textContent = highScore;
    try { localStorage.setItem('snakeHighScore', highScore); } catch {}
  }
  gameOverOverlay.classList.remove('hidden');
}

function startLoop() {
  stopLoop();
  gameRunning = true;
  gameLoop = setInterval(update, speed);
}

function stopLoop() {
  if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
}

function startGame() {
  speed = parseInt(document.querySelector('input[name="speed"]:checked').value);
  speedLabelEl.textContent = speedNames[speed] || '自定义';
  startOverlay.classList.add('hidden');
  gameOverOverlay.classList.add('hidden');
  init();
  startLoop();
}

// Keyboard
document.addEventListener('keydown', e => {
  const key = e.key;

  if (key === ' ' || key === 'Escape') {
    if (!gameRunning) return;
    e.preventDefault();
    gamePaused = !gamePaused;
    pauseBadge.classList.toggle('hidden', !gamePaused);
    return;
  }

  const dirs = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    s: { x: 0, y: 1 },  S: { x: 0, y: 1 },
    a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
  };
  const nd = dirs[key];
  if (nd && gameRunning && !gamePaused) {
    if (nd.x !== -direction.x || nd.y !== -direction.y) {
      nextDirection = nd;
      playKeySound();
    }
  }
});

// Touch swipe
let touchX, touchY;
canvas.addEventListener('touchstart', e => {
  initAudio();
  const t = e.touches[0];
  touchX = t.clientX; touchY = t.clientY;
}, { passive: true });

canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

canvas.addEventListener('touchend', e => {
  if (!touchX || !touchY || !gameRunning || gamePaused) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
  } else {
    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
  }
  playKeySound();
}, { passive: true });

// D-pad buttons (mobile)
const dirMap = {
  up:    { x: 0, y: -1 },
  down:  { x: 0, y: 1 },
  left:  { x: -1, y: 0 },
  right: { x: 1, y: 0 },
};

function handleDpad(dir) {
  initAudio();
  if (!gameRunning || gamePaused) return;
  const nd = dirMap[dir];
  if (nd && !(nd.x === -direction.x && nd.y === -direction.y)) {
    nextDirection = nd;
    playKeySound();
  }
}

document.querySelectorAll('.dpad button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    handleDpad(btn.dataset.dir);
  });
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    handleDpad(btn.dataset.dir);
  });
});

// Buttons
document.getElementById('startBtn').addEventListener('click', () => { initAudio(); startGame(); });
document.getElementById('restartBtn').addEventListener('click', () => { initAudio(); startGame(); });

// Animation loop for particles & popup
function animate() {
  let dirty = false;
  if (particles.length > 0) {
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life -= 0.025;
      return p.life > 0;
    });
    dirty = true;
  }
  if (scorePopup) {
    scorePopup.y -= 1.2;
    scorePopup.life -= 0.025;
    if (scorePopup.life <= 0) scorePopup = null;
    dirty = true;
  }
  if (dirty && gameRunning) draw();
  requestAnimationFrame(animate);
}

// Load high score
try { highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0; } catch { highScore = 0; }
highScoreEl.textContent = highScore;

// Draw initial
init();
animate();
</script>
</body>
</html>
